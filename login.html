<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKRA - Authorized Personnel Only</title>
    <style>
        body { 
            background: #000; 
            color: #00d2ff; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .login-container {
            width: 350px;
            padding: 40px;
            border: 1px solid #00d2ff;
            border-radius: 15px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            text-align: center;
        }
        h2 { letter-spacing: 3px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.8rem; display: block; margin-bottom: 5px; opacity: 0.7; }
        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #00d2ff; box-shadow: 0 0 10px #00d2ff44; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #00d2ff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .btn:hover { background: #008fb3; }
        .toggle-text {
            margin-top: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.6;
        }
        .toggle-text:hover { opacity: 1; text-decoration: underline; }
        #status-msg { margin-top: 15px; font-size: 0.85rem; height: 20px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2 id="form-title">SYSTEM LOGIN</h2>
    <div id="status-msg"></div>

    <div class="input-group">
        <label>OPERATOR ID</label>
        <input type="text" id="username" placeholder="Enter Username...">
    </div>

    <div class="input-group">
        <label>ACCESS KEY</label>
        <input type="password" id="password" placeholder="Enter Password...">
    </div>

    <button class="btn" id="main-btn" onclick="authenticate()">Initialize</button>
    <div class="toggle-text" id="toggle-link" onclick="toggleMode()">New Operator? Request Registry.</div>
</div>

<script>
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? "SYSTEM LOGIN" : "REGISTER OPERATOR";
        document.getElementById('main-btn').innerText = isLoginMode ? "Initialize" : "Create Account";
        document.getElementById('toggle-link').innerText = isLoginMode ? "New Operator? Request Registry." : "Already have ID? Sign In.";
        document.getElementById('status-msg').innerText = "";
    }

    async function authenticate() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const status = document.getElementById('status-msg');

        if (!user || !pass) {
            status.style.color = "red";
            status.innerText = "Error: Credentials incomplete.";
            return;
        }

        const route = isLoginMode ? '/login' : '/signup';
        status.style.color = "#00d2ff";
        status.innerText = isLoginMode ? "Verifying..." : "Creating Sector...";

        try {
            const response = await fetch(route, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await response.json();

            if (response.ok) {
                if (isLoginMode) {
                    status.innerText = "ACCESS GRANTED. Redirecting...";
                    setTimeout(() => window.location.href = "/", 1000);
                } else {
                    alert("Account Created. Your private sector is ready. Please log in.");
                    toggleMode();
                }
            } else {
                status.style.color = "red";
                status.innerText = data.message || "ACCESS DENIED.";
            }
        } catch (err) {
            status.style.color = "red";
            status.innerText = "SYSTEM ERROR: Connection failed.";
        }
    }
</script>

</body>
</html>
