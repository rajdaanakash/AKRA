<!DOCTYPE html>
<html lang="en">

<head>


    <meta name="description"
        content="AKRA: Advanced Kinects Responses Algorithm. A private AI assistant for mission logs and secure neural collaboration.">
    <meta name="keywords" content="AKRA, AI Assistant, Neural Link, Mission Logs, Akash DU, Delhi University AI">
    <meta name="author" content="Akash">

    <title>AKRA | Advanced AI System Interface</title>

    <meta property="og:title" content="AKRA - Neural AI Interface">
    <meta property="og:description" content="Secure your mission logs with the Advanced Kinects Responses Algorithm.">
    <meta property="og:image" content="https://your-site-url.com/logo.png">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="akra.png">
    <script type="application/ld+json">
        {
         "@context": "https://schema.org",
         "@type": "SoftwareApplication",
         "name": "AKRA",
         "operatingSystem": "Web",
         "applicationCategory": "Artificial Intelligence",
         "description": "Advanced Kinects Responses Algorithm created by Akash.",
         "offers": {
             "@type": "Offer",
             "price": "0",
             "priceCurrency": "INR"
            }
        }
    </script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">AKRA SYSTEM</div>
        <div class="nav-links">
            <a href="#" onclick="showSection('dashboard')">Dashboard</a>
            <a href="#" onclick="showSection('history')">Mission Logs</a>
            <a href="#" onclick="showSection('notes')">Permanent Notes</a>
        </div>
    </nav>
    <div class="io-panel">
        <h3>Hardware Routing</h3>
        <div class="io-group">
            <label>Microphone:</label>
            <select id="mic-select" onchange="syncIO()">
                <option value="Frontend" selected>📱 Phone/Browser Mic</option>
                <option value="Backend">💻 Laptop Mic</option>
            </select>
        </div>
        <div class="io-group">
            <label>Speaker:</label>
            <select id="speaker-select" onchange="syncIO()">
                <option value="Frontend" selected>📱 Phone/Browser Speaker</option>
                <option value="Backend">💻 Laptop Speaker</option>
            </select>
        </div>
    </div>

    <div id="sidebar">
    </div>

    <div id="main-interface">
        <div id="chat-history-display">
        </div>
    </div>
    <hr>
    <div id="directory-list">
        <p class="loading">Scanning sectors...</p>
    </div>
    </div>

    <div class="main-content">
    </div>

    <div id="dashboard-section" class="page-section">
        <div id="eva-orb" onclick="toggleListening()"></div>
        <div id="status">Click the orb to talk to AKRA</div>
        <div id="chat-results-area" style="height: auto; overflow: visible; margin: 20px 0;"></div>



        <div id="image-preview-container" style="display: none; margin-bottom: 10px;">
            <img id="image-preview" src="" alt="Thumbnail"
                style="width: 60px; height: 60px; border-radius: 8px; border: 2px solid #00d2ff; object-fit: cover;">
            <button onclick="clearAttachment()"
                style="background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; position: relative; top: -45px; left: -15px;">×</button>
        </div>

        <div class="input-container">
            <input type="text" id="userPrompt" placeholder="Ask about an image or give a command...">
            <button onclick="sendTextPrompt()" class="send-btn">Send Command</button>
            <button onclick="uploadImage()" class="send-btn vision-btn">📎 Attach</button>
        </div>


        <br>

        <div class="controls">
            <button onclick="stopSpeaking()" class="stop-btn">Stop Speaking</button>
            <select id="mood-select" onchange="changeEVAMood()">
                <option value="Professional">Professional</option>
                <option value="Friendly">Friendly</option>
                <option value="JARVIS">J.A.R.V.I.S.</option>
            </select>
        </div>
    </div>

    <div id="history-section" class="page-section" style="display:none;">
        <h2 class="section-title">Recent Interactions</h2>
        <div id="history-list" class="log-container"></div>
        <button onclick="loadHistory()" class="refresh-btn">🔄 Refresh History</button>
    </div>

    <div id="notes-section" class="page-section" style="display:none;">
        <h2 class="section-title">Permanent Knowledge Bank</h2>
        <div id="notes-list" class="log-container"></div>
        <button onclick="loadNotes()" class="refresh-btn">📚 Sync Notes</button>
    </div>
    <div id="safety-disclaimer">
        ⚠️ <span style="color: #00d2ff;">SECURE PROTOCOL:</span> AKRA is AI it can make mistakes. Verify all mission
        critical
        data...
    </div>

    <script src="script.js"></script>

</body>
